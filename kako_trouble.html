
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>過去トラブル登録</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Hiragino Sans',sans-serif;background:#f0f2f5;min-height:100vh}

/* ヘッダー */
.header{background:#c0392b;color:white;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header-title{font-size:18px;font-weight:bold;flex:1}
.header-count{background:rgba(255,255,255,.2);padding:2px 10px;border-radius:12px;font-size:13px}

/* 検索バー */
.search-bar{background:white;padding:10px 16px;border-bottom:1px solid #e0e0e0;display:flex;gap:8px}
.search-bar input{flex:1;border:1px solid #ddd;border-radius:6px;padding:8px 12px;font-size:14px;outline:none}
.search-bar input:focus{border-color:#c0392b}

/* カード一覧 */
.card-list{padding:12px;display:flex;flex-direction:column;gap:10px;padding-bottom:80px}
.card{background:white;border-radius:10px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.1);cursor:pointer;border-left:4px solid #c0392b;transition:box-shadow .2s}
.card:hover{box-shadow:0 3px 12px rgba(0,0,0,.15)}
.card-title{font-size:15px;font-weight:bold;color:#333;margin-bottom:6px}
.card-meta{font-size:12px;color:#888;margin-bottom:8px}
.card-keywords{display:flex;flex-wrap:wrap;gap:4px}
.keyword-tag{background:#ffeaea;color:#c0392b;border:1px solid #f5c6c6;padding:2px 8px;border-radius:12px;font-size:11px}
.card-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:10px}
.btn-edit{background:#f0f0f0;color:#555;border:none;padding:5px 14px;border-radius:5px;font-size:12px;cursor:pointer}
.btn-del{background:#ffeaea;color:#c0392b;border:none;padding:5px 14px;border-radius:5px;font-size:12px;cursor:pointer}

/* FAB */
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:#c0392b;color:white;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 12px rgba(192,57,43,.5);display:flex;align-items:center;justify-content:center;z-index:200;transition:transform .2s}
.fab:hover{transform:scale(1.1)}

/* オーバーレイ */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center}
.overlay.active{display:flex}

/* モーダル */
.modal{background:white;border-radius:16px;width:92%;max-width:560px;max-height:90vh;overflow-y:auto;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:17px;font-weight:bold;color:#333}
.modal-close{background:none;border:none;font-size:22px;color:#888;cursor:pointer}

/* フォーム */
.form-group{margin-bottom:14px}
.form-label{font-size:13px;font-weight:bold;color:#555;margin-bottom:5px;display:block}
.form-label .req{color:#c0392b;margin-left:3px}
.form-input{width:100%;border:1px solid #ddd;border-radius:6px;padding:9px 12px;font-size:14px;outline:none;font-family:inherit}
.form-input:focus{border-color:#c0392b}
textarea.form-input{resize:vertical;min-height:80px}

/* キーワードグループ（AND/OR） */
.kw-groups{display:flex;flex-direction:column;gap:0}
.kw-group-wrap{position:relative}
.kw-group{border:2px solid #ddd;border-radius:8px;padding:8px 10px;background:#fff}
.kw-group-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.kw-group-label{font-size:11px;font-weight:800;color:#c0392b;background:#ffeaea;padding:2px 8px;border-radius:10px;letter-spacing:.04em}
.btn-kw-group-del{background:none;border:none;color:#aaa;font-size:16px;cursor:pointer;line-height:1;padding:0 4px}
.btn-kw-group-del:hover{color:#c0392b}
.keyword-input-area{border:1px solid #ddd;border-radius:6px;padding:6px 8px;display:flex;flex-wrap:wrap;gap:5px;min-height:38px;cursor:text;background:#fafafa}
.keyword-input-area:focus-within{border-color:#c0392b;background:#fff}
.kw-chip{background:#ffeaea;color:#c0392b;border:1px solid #f5c6c6;padding:3px 8px;border-radius:12px;font-size:12px;display:flex;align-items:center;gap:4px}
.kw-chip-del{cursor:pointer;font-size:14px;line-height:1;color:#c0392b}
.kw-raw-input{border:none;outline:none;font-size:14px;flex:1;min-width:80px;font-family:inherit;background:transparent}
.kw-or-sep{display:flex;align-items:center;gap:6px;padding:4px 0;color:#f39c12}
.kw-or-label{font-size:11px;font-weight:800;background:#fff8e1;color:#b45309;border:1px solid #f39c12;padding:2px 10px;border-radius:10px}
.kw-or-line{flex:1;height:1px;background:#fde68a}
.btn-kw-add-group{background:transparent;border:2px dashed #f39c12;color:#b45309;border-radius:8px;padding:7px 0;font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-top:6px;transition:.2s}
.btn-kw-add-group:hover{background:#fff8e1}
.btn-kw-add-group:disabled{opacity:.38;cursor:not-allowed}

/* 写真アップロード */
.photo-area{border:2px dashed #ddd;border-radius:8px;padding:16px;text-align:center;cursor:pointer;color:#aaa;font-size:13px;transition:border-color .2s}
.photo-area:hover{border-color:#c0392b;color:#c0392b}
.photo-previews{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.photo-preview{position:relative;width:80px;height:80px}
.photo-preview img{width:80px;height:80px;object-fit:cover;border-radius:6px}
.photo-preview-del{position:absolute;top:-5px;right:-5px;width:20px;height:20px;background:#c0392b;color:white;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer}

/* 送信ボタン */
.btn-submit{width:100%;background:#c0392b;color:white;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:bold;cursor:pointer;margin-top:8px}
.btn-submit:disabled{background:#ccc;cursor:default}

/* 詳細モーダル */
.detail-section{margin-bottom:16px}
.detail-label{font-size:12px;color:#888;margin-bottom:4px}
.detail-value{font-size:14px;color:#333;white-space:pre-wrap;word-break:break-all}
.detail-photos{display:flex;flex-wrap:wrap;gap:8px}
.detail-photos img{width:100px;height:100px;object-fit:cover;border-radius:6px;cursor:pointer}

/* 空状態 */
.empty{text-align:center;padding:48px 24px;color:#aaa}
.empty-icon{font-size:48px;margin-bottom:12px}

/* トースト */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

.loading{text-align:center;padding:40px;color:#aaa;font-size:14px}
</style>
</head>
<body>

<div class="header">
  <span style="font-size:22px">⚠️</span>
  <span class="header-title">過去トラブル登録</span>
  <span class="header-count" id="count">0件</span>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="タイトル・キーワード・工程で検索…" oninput="renderList()">
</div>

<div id="cardList" class="card-list">
  <div class="loading">読み込み中…</div>
</div>

<button class="fab" onclick="openAddModal()">＋</button>

<!-- ===== 登録/編集モーダル ===== -->
<div class="overlay" id="formOverlay" onclick="closeFormModal(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="formTitle">過去トラ登録</span>
      <button class="modal-close" onclick="closeFormModalForce()">✕</button>
    </div>

    <div class="form-group">
      <label class="form-label">タイトル<span class="req">*</span></label>
      <input class="form-input" id="fTitle" placeholder="例：キズ発生（溶接工程）">
    </div>

    <div class="form-group">
      <label class="form-label">キーワードグループ<span class="req">*</span>　<span style="font-weight:normal;color:#aaa">グループ内=AND　グループ間=OR（最大5グループ）</span></label>
      <div class="kw-groups" id="kwGroups"></div>
      <button type="button" class="btn-kw-add-group" id="btnAddKwGroup" onclick="addKwGroup()">＋ OR グループを追加</button>
    </div>

    <div class="form-group">
      <label class="form-label">詳細内容<span class="req">*</span></label>
      <textarea class="form-input" id="fContent" rows="4" placeholder="トラブルの詳細を入力してください"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">対策内容</label>
      <textarea class="form-input" id="fCountermeasure" rows="3" placeholder="実施した対策を入力してください"></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">発生日</label>
      <input class="form-input" type="date" id="fDate">
    </div>

    <div class="form-group">
      <label class="form-label">担当部署・工程</label>
      <input class="form-input" id="fDepartment" placeholder="例：溶接工程・第2ライン">
    </div>

    <div class="form-group">
      <label class="form-label">添付写真</label>
      <div class="photo-area" onclick="document.getElementById('photoInput').click()">
        📷 タップして写真を追加
      </div>
      <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="handlePhotoSelect(event)">
      <div class="photo-previews" id="photoPreviews"></div>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="submitForm()">登録する</button>
  </div>
</div>

<!-- ===== 詳細モーダル ===== -->
<div class="overlay" id="detailOverlay" onclick="closeDetailModal(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">過去トラ詳細</span>
      <button class="modal-close" onclick="closeDetailModalForce()">✕</button>
    </div>
    <div id="detailContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js';
import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js';
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, orderBy, query, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js';
import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.4/firebase-storage.js';

// ============================================================
// ★ Firebase 設定（abnreport-fd733 と同じプロジェクトを使用）
//    apiKey などは既存の abnreport.html と同じ値をコピーしてください
// ============================================================
const firebaseConfig = {
  apiKey:            "AIzaSyA0YUIpIDh4WB4p1ewiNB0XfwHve0ByljU",
  authDomain:        "abnreport-fd733.firebaseapp.com",
  databaseURL:       "https://abnreport-fd733-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "abnreport-fd733",
  storageBucket:     "abnreport-fd733.firebasestorage.app",
  messagingSenderId: "349748947315",
  appId:             "1:349748947315:web:010cb671d2a95bcf1f7d06"
};

const app = initializeApp(firebaseConfig);
const auth    = getAuth(app);
const db      = getFirestore(app);
const storage = getStorage(app);

// ============================================================
// 状態
// ============================================================
let troubles         = [];   // 全件キャッシュ
let editingId        = null; // 編集中のドキュメントID
let kwGroups         = [[]]; // キーワードグループ [[kw,...], ...] グループ内AND, グループ間OR
let selectedPhotos   = [];   // 新規選択写真 (File[])
let existingPhotoURLs= [];   // 編集時の既存写真URL[]

// ============================================================
// 初期化
// ============================================================
signInAnonymously(auth)
  .then(() => loadTroubles())
  .catch(e => { console.error(e); showToast('認証エラー'); });

function loadTroubles() {
  onSnapshot(query(collection(db, 'pastTroubles'), orderBy('createdAt', 'desc')), snap => {
      troubles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      document.getElementById('count').textContent = troubles.length + '件';
      renderList();
    }, e => { console.error(e); showToast('読み込みエラー'); });
}

// ============================================================
// 一覧描画
// ============================================================
function renderList() {
  const q   = document.getElementById('searchInput').value.trim().toLowerCase();
  const list = q
    ? troubles.filter(t => {
        if (normText(t.title).includes(q)) return true;
        if (normText(t.department).includes(q)) return true;
        // keywordGroups 内の全キーワードを検索対象に
        const allKws = (t.keywordGroups||[]).flatMap(g => g.keywords||[]);
        if (allKws.some(k => normText(k).includes(q))) return true;
        return false;
      })
    : troubles;

  const el = document.getElementById('cardList');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📋</div>${q?'該当なし':'まだ登録がありません'}</div>`;
    return;
  }
  el.innerHTML = list.map(t => `
    <div class="card" onclick="openDetail('${t.id}')">
      <div class="card-title">${esc(t.title)}</div>
      <div class="card-meta">
        ${t.date ? '📅 '+t.date+'　' : ''}
        ${t.department ? '🏭 '+esc(t.department) : ''}
        ${(t.photoURLs||[]).length ? '　📷 '+t.photoURLs.length+'枚' : ''}
      </div>
      <div class="card-keywords">
        ${_renderKwGroupChips(t)}
      </div>
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="btn-edit" onclick="openEditModal('${t.id}')">✏️ 編集</button>
        <button class="btn-del"  onclick="deleteTrouble('${t.id}')">🗑 削除</button>
      </div>
    </div>
  `).join('');
}

// ============================================================
// 詳細モーダル
// ============================================================
function openDetail(id) {
  const t = troubles.find(x => x.id === id);
  if (!t) return;
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-section">
      <div class="detail-label">タイトル</div>
      <div class="detail-value" style="font-size:16px;font-weight:bold;color:#c0392b">${esc(t.title)}</div>
    </div>
    <div class="detail-section">
      <div class="detail-label">検索条件（AND/OR）</div>
      <div class="card-keywords">${_renderKwGroupChipsDetail(t)}</div>
    </div>
    ${t.date ? `<div class="detail-section"><div class="detail-label">発生日</div><div class="detail-value">${t.date}</div></div>` : ''}
    ${t.department ? `<div class="detail-section"><div class="detail-label">担当部署・工程</div><div class="detail-value">${esc(t.department)}</div></div>` : ''}
    <div class="detail-section">
      <div class="detail-label">詳細内容</div>
      <div class="detail-value">${esc(t.content)}</div>
    </div>
    ${t.countermeasure ? `<div class="detail-section"><div class="detail-label">対策内容</div><div class="detail-value">${esc(t.countermeasure)}</div></div>` : ''}
    ${(t.photoURLs||[]).length ? `
      <div class="detail-section">
        <div class="detail-label">添付写真</div>
        <div class="detail-photos">
          ${t.photoURLs.map(u=>`<img src="${u}" onclick="window.open('${u}','_blank')" title="タップで拡大">`).join('')}
        </div>
      </div>` : ''}
  `;
  document.getElementById('detailOverlay').classList.add('active');
}
function closeDetailModal(e)    { if(e.target===document.getElementById('detailOverlay')) closeDetailModalForce(); }
function closeDetailModalForce(){ document.getElementById('detailOverlay').classList.remove('active'); }

// ============================================================
// フォームモーダル（登録 / 編集）
// ============================================================
function openAddModal() {
  editingId = null; kwGroups = [[]]; selectedPhotos = []; existingPhotoURLs = [];
  document.getElementById('formTitle').textContent  = '過去トラ登録';
  document.getElementById('submitBtn').textContent  = '登録する';
  clearForm();
  document.getElementById('formOverlay').classList.add('active');
}

function openEditModal(id) {
  const t = troubles.find(x => x.id === id);
  if (!t) return;
  editingId = id;
  // keywordGroups があれば使用、なければ空グループ
  kwGroups = (t.keywordGroups && t.keywordGroups.length)
    ? t.keywordGroups.map(g => [...(g.keywords||[])])
    : [[]];
  if (!kwGroups.length) kwGroups = [[]];
  selectedPhotos    = [];
  existingPhotoURLs = [...(t.photoURLs||[])];

  document.getElementById('formTitle').textContent    = '過去トラ編集';
  document.getElementById('submitBtn').textContent    = '更新する';
  document.getElementById('fTitle').value            = t.title||'';
  document.getElementById('fContent').value          = t.content||'';
  document.getElementById('fCountermeasure').value   = t.countermeasure||'';
  document.getElementById('fDate').value             = t.date||'';
  document.getElementById('fDepartment').value       = t.department||'';
  renderKwGroups();
  renderPhotoPreviews();
  document.getElementById('formOverlay').classList.add('active');
}

function clearForm() {
  ['fTitle','fContent','fCountermeasure','fDepartment'].forEach(id => document.getElementById(id).value='');
  document.getElementById('fDate').value = '';
  document.getElementById('photoPreviews').innerHTML = '';
  kwGroups = [[]];
  renderKwGroups();
}

function closeFormModal(e)    { if(e.target===document.getElementById('formOverlay')) closeFormModalForce(); }
function closeFormModalForce(){ document.getElementById('formOverlay').classList.remove('active'); }

// ============================================================
// キーワードグループ入力（AND/OR）
// ============================================================
const MAX_GROUPS = 5;

function addKwGroup() {
  if (kwGroups.length >= MAX_GROUPS) return;
  kwGroups.push([]);
  renderKwGroups();
  updateAddGroupBtn();
}

function removeKwGroup(gi) {
  if (kwGroups.length <= 1) { kwGroups[0] = []; renderKwGroups(); return; }
  kwGroups.splice(gi, 1);
  renderKwGroups();
  updateAddGroupBtn();
}

function addKwToGroup(gi, val) {
  const v = val.trim().replace(/[,、]/g, '');
  if (!v || kwGroups[gi].includes(v)) return;
  kwGroups[gi].push(v);
  renderKwGroups();
}

function removeKwFromGroup(gi, ki) {
  kwGroups[gi].splice(ki, 1);
  renderKwGroups();
}

function handleKwKey(e, gi) {
  const triggers = ['Enter', '、', ',', '　'];
  if (triggers.includes(e.key)) {
    e.preventDefault();
    flushGroupInput(gi);
  }
  const inp = document.getElementById(`kwRaw_${gi}`);
  if (e.key === 'Backspace' && inp && inp.value === '' && kwGroups[gi].length) {
    kwGroups[gi].pop();
    renderKwGroups();
  }
}

function flushGroupInput(gi) {
  const inp = document.getElementById(`kwRaw_${gi}`);
  if (!inp) return;
  addKwToGroup(gi, inp.value);
  inp.value = '';
}

function flushKwInput() {
  kwGroups.forEach((_, gi) => flushGroupInput(gi));
}

function updateAddGroupBtn() {
  const btn = document.getElementById('btnAddKwGroup');
  if (btn) btn.disabled = kwGroups.length >= MAX_GROUPS;
}

function renderKwGroups() {
  const container = document.getElementById('kwGroups');
  if (!container) return;
  container.innerHTML = '';
  kwGroups.forEach((kws, gi) => {
    // OR セパレーター
    if (gi > 0) {
      const sep = document.createElement('div');
      sep.className = 'kw-or-sep';
      sep.innerHTML = '<div class="kw-or-line"></div><span class="kw-or-label">OR</span><div class="kw-or-line"></div>';
      container.appendChild(sep);
    }
    const wrap = document.createElement('div');
    wrap.className = 'kw-group-wrap';

    const group = document.createElement('div');
    group.className = 'kw-group';

    // グループヘッダー
    const hdr = document.createElement('div');
    hdr.className = 'kw-group-header';
    hdr.innerHTML = `<span class="kw-group-label">グループ${gi+1}（AND条件）</span>
      <button type="button" class="btn-kw-group-del" title="このグループを削除" onclick="removeKwGroup(${gi})">✕</button>`;
    group.appendChild(hdr);

    // キーワード入力エリア
    const area = document.createElement('div');
    area.className = 'keyword-input-area';
    area.id = `kwArea_${gi}`;
    area.addEventListener('click', () => document.getElementById(`kwRaw_${gi}`)?.focus());

    kws.forEach((k, ki) => {
      const chip = document.createElement('span');
      chip.className = 'kw-chip';
      chip.innerHTML = `${esc(k)}<span class="kw-chip-del" onclick="removeKwFromGroup(${gi},${ki})">×</span>`;
      area.appendChild(chip);
    });

    const inp = document.createElement('input');
    inp.className = 'kw-raw-input';
    inp.id = `kwRaw_${gi}`;
    inp.placeholder = kws.length ? 'AND条件を追加…' : 'キーワードを入力…';
    inp.setAttribute('onkeydown', `handleKwKey(event,${gi})`);
    inp.setAttribute('onblur', `flushGroupInput(${gi})`);
    area.appendChild(inp);
    group.appendChild(area);
    wrap.appendChild(group);
    container.appendChild(wrap);
  });
  updateAddGroupBtn();
}

// 旧関数名の互換シム（念のため）
function renderKeywords() { renderKwGroups(); }

// ============================================================
// 写真
// ============================================================
function handlePhotoSelect(e) {
  selectedPhotos.push(...Array.from(e.target.files));
  renderPhotoPreviews();
  e.target.value = '';
}
function removeExistingPhoto(i){ existingPhotoURLs.splice(i,1); renderPhotoPreviews(); }
function removeNewPhoto(i)     { selectedPhotos.splice(i,1);    renderPhotoPreviews(); }
function renderPhotoPreviews() {
  const c = document.getElementById('photoPreviews');
  c.innerHTML = '';
  existingPhotoURLs.forEach((url,i) => {
    const d = document.createElement('div'); d.className='photo-preview';
    d.innerHTML=`<img src="${url}"><div class="photo-preview-del" onclick="removeExistingPhoto(${i})">×</div>`;
    c.appendChild(d);
  });
  selectedPhotos.forEach((file,i) => {
    const r = new FileReader();
    r.onload = ev => {
      const d = document.createElement('div'); d.className='photo-preview';
      d.innerHTML=`<img src="${ev.target.result}"><div class="photo-preview-del" onclick="removeNewPhoto(${i})">×</div>`;
      c.appendChild(d);
    };
    r.readAsDataURL(file);
  });
}

// ============================================================
// 登録 / 更新
// ============================================================
async function submitForm() {
  // 入力途中のキーワードを確定
  flushKwInput();

  const title   = document.getElementById('fTitle').value.trim();
  const content = document.getElementById('fContent').value.trim();

  // 空グループを除去
  const validGroups = kwGroups.map(g => g.filter(k => k)).filter(g => g.length > 0);

  if (!title)                { showToast('タイトルを入力してください'); return; }
  if (!validGroups.length)   { showToast('キーワードを1つ以上入力してください'); return; }
  if (!content)              { showToast('詳細内容を入力してください'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '処理中…';

  try {
    // 新規写真を Storage にアップロード
    const newURLs = await Promise.all(selectedPhotos.map(async file => {
      const ref = storageRef(storage, `pastTroubles/${Date.now()}_${encodeURIComponent(file.name)}`);
      await uploadBytes(ref, file);
      return await getDownloadURL(ref);
    }));

    const data = {
      title,
      keywordGroups:   validGroups.map(kws => ({ keywords: kws })),
      content,
      countermeasure:  document.getElementById('fCountermeasure').value.trim(),
      date:            document.getElementById('fDate').value,
      department:      document.getElementById('fDepartment').value.trim(),
      photoURLs:       [...existingPhotoURLs, ...newURLs],
      updatedAt:       serverTimestamp()
    };

    if (editingId) {
      await updateDoc(doc(db, 'pastTroubles', editingId), data);
      showToast('✅ 更新しました');
    } else {
      data.createdAt = serverTimestamp();
      await addDoc(collection(db, 'pastTroubles'), data);
      showToast('✅ 登録しました');
    }
    closeFormModalForce();
  } catch(e) {
    console.error(e);
    showToast('❌ エラーが発生しました');
  } finally {
    btn.disabled = false;
    btn.textContent = editingId ? '更新する' : '登録する';
  }
}

// ============================================================
// 削除
// ============================================================
async function deleteTrouble(id) {
  if (!confirm('この過去トラを削除しますか？')) return;
  try {
    await deleteDoc(doc(db, 'pastTroubles', id));
    showToast('🗑 削除しました');
  } catch(e) { showToast('削除に失敗しました'); }
}

// ============================================================
// ユーティリティ
// ============================================================
// 全角→半角・小文字正規化（キーワードマッチング用）
// キーワードグループ表示ヘルパー
function _renderKwGroupChips(t) {
  const groups = t.keywordGroups || [];
  if (!groups.length) {
    // keywordGroups 未設定の場合（旧データ等）は空表示
    return '<span style="color:#aaa;font-size:11px;">（キーワード未設定）</span>';
  }
  return groups.map((g, i) => {
    const chips = (g.keywords||[]).map(k => `<span class="keyword-tag">${esc(k)}</span>`).join(
      '<span style="font-size:10px;color:#f39c12;font-weight:800;margin:0 2px;">AND</span>'
    );
    const sep = i > 0 ? '<span style="font-size:10px;color:#b45309;font-weight:800;background:#fff8e1;padding:1px 5px;border-radius:6px;margin:0 4px;">OR</span>' : '';
    return sep + chips;
  }).join('');
}
function _renderKwGroupChipsDetail(t) {
  const groups = t.keywordGroups || [];
  if (!groups.length) return '<span style="color:#aaa;">（未設定）</span>';
  return groups.map((g, i) => {
    const label = i > 0 ? '<span style="font-size:11px;font-weight:800;color:#b45309;background:#fff8e1;border:1px solid #f39c12;padding:2px 8px;border-radius:8px;margin:0 6px;">OR</span>' : '';
    const chips = (g.keywords||[]).map(k => `<span class="keyword-tag">${esc(k)}</span>`).join(
      '<span style="font-size:11px;color:#f39c12;font-weight:800;margin:0 3px;">AND</span>'
    );
    return `${label}<span style="display:inline-flex;align-items:center;background:#fafafa;border:1px solid #e0e0e0;padding:3px 8px;border-radius:8px;gap:4px;">${chips}</span>`;
  }).join('');
}

function normText(str){
  return (str||'').replace(/[Ａ-Ｚａ-ｚ０-９]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0)).toLowerCase();
}
function esc(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
